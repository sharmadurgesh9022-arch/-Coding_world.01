<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Particle Metamorphosis — Hand Tracking + Shape Change</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; }
    #info {
      position: absolute; top: 20px; left: 20px;
      color: #fff; background: rgba(0,0,0,0.6);
      padding: 8px 18px; border-radius: 40px;
      backdrop-filter: blur(6px);
      z-index: 20; font-size: 12px;
      pointer-events: none;
    }
    #mode-badge {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: #fff; background: rgba(0,0,0,0.7);
      padding: 12px 28px; border-radius: 60px;
      font-size: 22px; font-weight: bold;
      z-index: 20; backdrop-filter: blur(8px);
      border: 2px solid rgba(255,215,0,0.5);
      white-space: nowrap;
      pointer-events: none;
    }
    #shape-btns {
      position: absolute; top: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 20;
    }
    .sbtn {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 6px 14px;
      border-radius: 20px; cursor: pointer;
      font-size: 12px;
      transition: 0.2s;
    }
    .sbtn:hover, .sbtn.active {
      background: rgba(255,200,0,0.2);
      border-color: rgba(255,200,0,0.6);
    }
    #status {
      position: absolute; bottom: 20px; right: 20px;
      background: rgba(0,0,0,0.7);
      padding: 4px 10px; border-radius: 20px;
      font-size: 10px;
      z-index: 20;
      color: #0f0;
    }
    #videoPreview {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 120px;
      border-radius: 8px;
      border: 2px solid #F97316;
      z-index: 25;
      background: #000;
    }
  </style>
</head>
<body>
<div id="info">✋ Move hand • Pinch to Zoom • Rotate to Change Shape</div>
<div id="mode-badge">❤️ HEART</div>
<div id="status">⚡ Loading...</div>
<div id="shape-btns">
  <button class="sbtn active" data-shape="0">❤️ Heart</button>
  <button class="sbtn" data-shape="1">🌸 Flower</button>
  <button class="sbtn" data-shape="2">🪐 Saturn</button>
  <button class="sbtn" data-shape="3">✨ Firework</button>
  <button class="sbtn" data-shape="4">⚪ Sphere</button>
  <button class="sbtn" data-shape="5">🍩 Torus</button>
</div>
<video id="videoPreview" autoplay playsinline muted></video>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ========== SCENE (Performance Optimized) ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.002);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

// ========== POST PROCESSING ==========
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.3, 0.1);
composer.addPass(bloomPass);

// ========== LIGHTS ==========
scene.add(new THREE.AmbientLight(0x404060));
const mainLight = new THREE.DirectionalLight(0xffaa88, 0.8);
mainLight.position.set(2, 4, 3);
scene.add(mainLight);
const fillLight = new THREE.PointLight(0x4466cc, 0.5);
fillLight.position.set(-2, 1, 3);
scene.add(fillLight);

// ========== STARS ==========
const starCount = 600;
const starGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPositions[i * 3] = (Math.random() - 0.5) * 300;
  starPositions[i * 3 + 1] = (Math.random() - 0.5) * 150;
  starPositions[i * 3 + 2] = (Math.random() - 0.5) * 100 - 30;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.6 }));
scene.add(stars);

// ========== PARTICLE SYSTEM ==========
const PARTICLE_COUNT = 3500;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = Math.random() * 1.8;
  positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i * 3 + 2] = r * Math.cos(phi);
  colors[i * 3] = 1;
  colors[i * 3 + 1] = 0.4;
  colors[i * 3 + 2] = 0.6;
}
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMaterial = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uPointSize: { value: 0.18 } },
  vertexShader: `
    attribute vec3 color;
    varying vec3 vColor;
    uniform float uTime;
    uniform float uPointSize;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = uPointSize * (250.0 / ( - mvPosition.z )) * (0.8 + 0.2 * sin(position.x * 3.0 + uTime * 4.0));
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      vec2 coord = gl_PointCoord;
      float dist = length(coord - vec2(0.5));
      if (dist > 0.5) discard;
      gl_FragColor = vec4(vColor, 0.8);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const particleSystem = new THREE.Points(geometry, particleMaterial);
scene.add(particleSystem);

// ========== SHAPES ==========
const SHAPES = {
  heart: (i, total) => {
    const t = (i / total) * Math.PI * 2;
    const s = 0.13;
    return [16 * Math.pow(Math.sin(t), 3) * s, (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * s, (Math.random() - 0.5) * 0.3];
  },
  flower: (i, total) => {
    const a = (i / total) * Math.PI * 2;
    const r = (Math.sin(6*a) * 0.7 + 1.0) * 0.8;
    return [Math.cos(a) * r, Math.sin(a) * r, (Math.random() - 0.5) * 0.4];
  },
  saturn: (i, total) => {
    if (i > total * 0.7) {
      const a = Math.random() * Math.PI * 2;
      const R = 1.5 + Math.random() * 0.4;
      return [Math.cos(a) * R * 0.6, (Math.random() - 0.5) * 0.3, Math.sin(a) * R * 0.6];
    }
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u, phi = Math.acos(2*v - 1);
    return [0.9 * Math.sin(phi) * Math.cos(theta), 0.9 * Math.sin(phi) * Math.sin(theta), 0.9 * Math.cos(phi)];
  },
  firework: (i) => {
    const a1 = Math.random() * Math.PI * 2;
    const a2 = Math.acos(2 * Math.random() - 1);
    const r = Math.random() * 1.6;
    return [r * Math.sin(a2) * Math.cos(a1), r * Math.sin(a2) * Math.sin(a1), r * Math.cos(a2)];
  },
  sphere: (i) => {
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u, phi = Math.acos(2*v - 1);
    return [1.2 * Math.sin(phi) * Math.cos(theta), 1.2 * Math.sin(phi) * Math.sin(theta), 1.2 * Math.cos(phi)];
  },
  torus: (i) => {
    const u = Math.random() * Math.PI * 2, v = Math.random() * Math.PI * 2;
    const R = 1.6, r = 0.55;
    return [(R + r * Math.cos(v)) * Math.cos(u), (R + r * Math.cos(v)) * Math.sin(u), r * Math.sin(v)];
  }
};
const SHAPE_KEYS = Object.keys(SHAPES);
const SHAPE_EMOJI = { heart:'❤️', flower:'🌸', saturn:'🪐', firework:'✨', sphere:'⚪', torus:'🍩' };

let currentShapeIdx = 0;
let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
function bakeTargetPositions(shapeKey) {
  const fn = SHAPES[shapeKey];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const [x, y, z] = fn(i, PARTICLE_COUNT);
    targetPositions[i*3] = x;
    targetPositions[i*3+1] = y;
    targetPositions[i*3+2] = z;
  }
}
function setShape(index) {
  currentShapeIdx = index;
  bakeTargetPositions(SHAPE_KEYS[index]);
  document.getElementById('mode-badge').innerHTML = `${SHAPE_EMOJI[SHAPE_KEYS[index]]} ${SHAPE_KEYS[index].toUpperCase()}`;
  document.querySelectorAll('.sbtn').forEach((btn, i) => btn.classList.toggle('active', i === index));
}
document.querySelectorAll('.sbtn').forEach(btn => btn.addEventListener('click', () => setShape(parseInt(btn.dataset.shape))));
setShape(0);

// ========== HAND TRACKING WITH SHAPE CHANGE ==========
let handX = 0.5, handY = 0.5;
let targetScale = 1.0, currentScale = 1.0;
let lastPinchState = false;
let shapeChangeCooldown = 0;

// Mouse fallback (shape change with mouse X position)
window.addEventListener('mousemove', (e) => {
  handX = e.clientX / window.innerWidth;
  handY = e.clientY / window.innerHeight;
  targetScale = 0.6 + handX * 2.0;
  // Shape change based on mouse X
  let newShape = Math.floor(handX * SHAPE_KEYS.length);
  if (newShape >= SHAPE_KEYS.length) newShape = SHAPE_KEYS.length - 1;
  if (newShape !== currentShapeIdx) {
    setShape(newShape);
  }
});

async function initHandTracking() {
  const statusDiv = document.getElementById('status');
  try {
    const { HandLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest');
    const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm');
    const handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',
        delegate: 'GPU'
      },
      numHands: 1,
      runningMode: 'VIDEO'
    });

    const video = document.getElementById('videoPreview');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    await video.play();

    statusDiv.innerHTML = '🟢 Hand tracking ACTIVE';
    statusDiv.style.color = '#0f0';

    let lastTime = performance.now();
    function detectHand() {
      const now = performance.now();
      if (now - lastTime > 60) {
        const results = handLandmarker.detectForVideo(video, now);
        if (results.landmarks && results.landmarks.length > 0) {
          const landmarks = results.landmarks[0];
          const wrist = landmarks[0];
          const indexTip = landmarks[8];
          const thumbTip = landmarks[4];
          const middleBase = landmarks[12];
          
          // Zoom control (Y axis)
          handX = Math.min(1, Math.max(0, wrist.x));
          handY = Math.min(1, Math.max(0, wrist.y));
          targetScale = 0.5 + (1 - wrist.y) * 2.2;
          
          // Shape change based on hand rotation (X coordinate movement)
          let newShape = Math.floor(handX * SHAPE_KEYS.length);
          if (newShape >= SHAPE_KEYS.length) newShape = SHAPE_KEYS.length - 1;
          if (newShape !== currentShapeIdx) {
            setShape(newShape);
          }
        }
        lastTime = now;
      }
      requestAnimationFrame(detectHand);
    }
    detectHand();
  } catch (error) {
    statusDiv.innerHTML = '⚠️ Mouse mode (no camera)';
    statusDiv.style.color = '#ff0';
  }
}
initHandTracking();

// ========== ANIMATION LOOP ==========
let lastAnimTime = performance.now();
function animate() {
  const now = performance.now();
  let delta = Math.min((now - lastAnimTime) / 1000, 0.033);
  lastAnimTime = now;
  const elapsed = now / 1000;
  
  particleMaterial.uniforms.uTime.value = elapsed;
  currentScale += (targetScale - currentScale) * 0.1;
  
  const posAttr = geometry.attributes.position;
  const posArray = posAttr.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    posArray[i*3] += (targetPositions[i*3] * currentScale - posArray[i*3]) * 0.12;
    posArray[i*3+1] += (targetPositions[i*3+1] * currentScale - posArray[i*3+1]) * 0.12;
    posArray[i*3+2] += (targetPositions[i*3+2] * currentScale - posArray[i*3+2]) * 0.12;
  }
  posAttr.needsUpdate = true;
  
  const colAttr = geometry.attributes.color;
  const colArray = colAttr.array;
  const baseHue = (handY * 0.5 + elapsed * 0.05) % 1.0;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const hue = (baseHue + i * 0.0002) % 1.0;
    const color = new THREE.Color().setHSL(hue, 0.8, 0.6);
    colArray[i*3] = color.r;
    colArray[i*3+1] = color.g;
    colArray[i*3+2] = color.b;
  }
  colAttr.needsUpdate = true;
  
  stars.rotation.y += 0.002 * (delta * 60);
  camera.position.x += ((handX - 0.5) * 1.2 - camera.position.x) * 0.05;
  camera.position.y += ((handY - 0.5) * 0.6 + 1.5 - camera.position.y) * 0.05;
  camera.lookAt(0, 0, 0);
  
  composer.render();
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
