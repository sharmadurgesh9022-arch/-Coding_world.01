<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>प्रोफेशनल शैडो कैलकुलेटर | बाइक मीटर ग्लो | जनरल स्टोर</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* ========== THEME VARIABLES ========== */
        :root {
            --bg-gradient-start: #3a3e45;
            --bg-gradient-end: #2c2f36;
            --calc-bg: #1e1f24;
            --display-bg: #0c0d10;
            --display-text: #f2f4f8;
            --expression-text: #9aa2b0;
            --btn-bg: #2c2e36;
            --btn-shadow: #131418;
            --btn-func-bg: #3a3f4e;
            --btn-func-color: #ffd966;
            --btn-clear-bg: #542e2e;
            --btn-clear-color: #ffaeae;
            --btn-equal-bg: #2b5e3b;
            --btn-equal-shadow: #1a3b24;
            --btn-op-color: #7fc9ff;
            --btn-num-bg: #24262e;
            --btn-special-bg: #2a2d38;
            --footer-color: #6e7485;
            --glow-opacity: 0.6;
            --history-bg: #1a1c22;
            --history-border: #2c2f36;
            --history-text: #cbd5e6;
            --scrollbar-thumb: #3a3f4e;
            --ripple-color: rgba(255,255,255,0.3);
        }

        body.light {
            --bg-gradient-start: #d4d9e8;
            --bg-gradient-end: #c2c7d6;
            --calc-bg: #f0f2f8;
            --display-bg: #e8ecf4;
            --display-text: #1a1f2e;
            --expression-text: #4a5568;
            --btn-bg: #e2e8f0;
            --btn-shadow: #b0b8c4;
            --btn-func-bg: #cbd5e1;
            --btn-func-color: #b45309;
            --btn-clear-bg: #fecaca;
            --btn-clear-color: #991b1b;
            --btn-equal-bg: #86efac;
            --btn-equal-shadow: #4ade80;
            --btn-op-color: #2563eb;
            --btn-num-bg: #f1f5f9;
            --btn-special-bg: #e2e8f0;
            --footer-color: #475569;
            --glow-opacity: 0.3;
            --history-bg: #ffffffcc;
            --history-border: #cbd5e1;
            --history-text: #1e293b;
            --scrollbar-thumb: #94a3b8;
            --ripple-color: rgba(0,0,0,0.1);
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, sans-serif;
            padding: 20px;
            transition: background 0.2s, color 0.2s;
        }

        .calculator {
            max-width: 580px;
            width: 100%;
            background: var(--calc-bg);
            border-radius: 56px;
            box-shadow: 0 30px 40px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
            padding: 24px 22px 28px;
            transition: background 0.2s;
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 6px;
        }
        .icon-btn {
            background: var(--btn-special-bg);
            border: none;
            font-size: 1.4rem;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--display-text);
            box-shadow: 0 3px 0 var(--btn-shadow);
            transition: 0.05s linear;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        .icon-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--btn-shadow);
        }

        .display-wrap {
            background: var(--display-bg);
            border-radius: 40px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.2s;
            animation: subtleGlowPulse 2s infinite ease-in-out;
        }
        @keyframes subtleGlowPulse {
            0% { box-shadow: inset 0 4px 12px rgba(0,0,0,0.4), 0 0 4px rgba(0,255,255,0.2), 0 0 0 1px rgba(255,255,255,0.1); }
            50% { box-shadow: inset 0 4px 12px rgba(0,0,0,0.4), 0 0 16px rgba(0,210,255,0.6), 0 0 0 1px rgba(255,255,255,0.2); }
            100% { box-shadow: inset 0 4px 12px rgba(0,0,0,0.4), 0 0 4px rgba(0,255,255,0.2), 0 0 0 1px rgba(255,255,255,0.1); }
        }
        #expression {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--expression-text);
            text-align: right;
            padding: 4px 0;
            font-family: 'Courier New', monospace;
            min-height: 32px;
            letter-spacing: 0.5px;
            overflow-x: auto;
            white-space: nowrap;
        }
        #result {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 3.4rem;
            font-weight: 800;
            color: var(--display-text);
            text-align: right;
            padding: 6px 0;
            font-family: 'Segoe UI', 'Fira Mono', monospace;
            word-break: break-word;
            text-shadow: 0 0 6px rgba(0,210,255, var(--glow-opacity));
            transition: text-shadow 0.2s;
            overflow-x: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }
        .btn {
            background: var(--btn-bg);
            border: none;
            border-radius: 40px;
            padding: 16px 0;
            font-size: 1.4rem;
            font-weight: 600;
            color: #eef2ff;
            font-family: inherit;
            transition: all 0.05s linear;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--btn-shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--btn-shadow);
        }
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background-color: var(--ripple-color);
            transform: scale(0);
            animation: ripple-animation 0.4s linear;
            pointer-events: none;
        }
        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        .btn-func { background: var(--btn-func-bg); color: var(--btn-func-color); font-size: 1.2rem; }
        .btn-clear { background: var(--btn-clear-bg); color: var(--btn-clear-color); }
        .btn-equal { background: var(--btn-equal-bg); color: white; box-shadow: 0 5px 0 var(--btn-equal-shadow); font-size: 1.6rem; }
        .btn-op { background: var(--btn-func-bg); color: var(--btn-op-color); font-size: 1.6rem; }
        .btn-num { background: var(--btn-num-bg); font-size: 1.6rem; color: var(--display-text); }
        .btn-special { background: var(--btn-special-bg); color: var(--btn-op-color); }

        .history-panel {
            background: var(--history-bg);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            margin-top: 16px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--history-border);
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .history-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 8px 8px;
            font-weight: 600;
            color: var(--display-text);
            border-bottom: 1px dashed var(--history-border);
        }
        .history-list {
            list-style: none;
            margin-top: 8px;
        }
        .history-list li {
            padding: 8px 12px;
            border-bottom: 1px solid var(--history-border);
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--history-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            gap: 8px;
            flex-wrap: wrap;
        }
        .history-list li:hover { background: rgba(100,150,200,0.2); border-radius: 20px; }
        .history-time {
            font-size: 0.65rem;
            color: var(--footer-color);
            font-family: monospace;
        }
        .clear-history {
            background: none;
            border: none;
            color: #f97316;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .clear-history:hover { background: rgba(249,115,22,0.2); }
        
        footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: indianred;
            padding: 8px;
        }
        
        @media (max-width: 500px) {
            .buttons { gap: 10px; }
            .btn { padding: 14px 0; font-size: 1.3rem; min-height: 56px; }
            .btn-num, .btn-op, .btn-special { font-size: 1.4rem; }
            #result { font-size: 2.2rem; }
            .history-panel { max-height: 160px; }
            .calc-header .icon-btn { padding: 6px 12px; font-size: 1.2rem; }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--history-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        
        .error-display {
            color: #ff6b6b !important;
            text-shadow: 0 0 4px rgba(255,0,0,0.5) !important;
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="calc-header">
        <button class="icon-btn" id="themeToggleBtn" aria-label="theme switch">🌓 थीम</button>
        <button class="icon-btn" id="historyToggleBtn" aria-label="toggle history">📜 हिस्ट्री</button>
    </div>
    <div class="display-wrap">
        <div id="expression"></div>
        <div id="result">0</div>
    </div>
    <div class="buttons">
        <button class="btn btn-clear" data-action="clear">AC</button>
        <button class="btn btn-func" data-action="backspace">⌫</button>
        <button class="btn btn-special" data-op="%">%</button>
        <button class="btn btn-op" data-op="/">÷</button>
        <button class="btn btn-func" data-action="sqrt">√</button>

        <button class="btn btn-num" data-num="7">7</button>
        <button class="btn btn-num" data-num="8">8</button>
        <button class="btn btn-num" data-num="9">9</button>
        <button class="btn btn-op" data-op="*">×</button>
        <button class="btn btn-func" data-action="square">x²</button>

        <button class="btn btn-num" data-num="4">4</button>
        <button class="btn btn-num" data-num="5">5</button>
        <button class="btn btn-num" data-num="6">6</button>
        <button class="btn btn-op" data-op="-">−</button>
        <button class="btn btn-func" data-action="reciprocal">1/x</button>

        <button class="btn btn-num" data-num="1">1</button>
        <button class="btn btn-num" data-num="2">2</button>
        <button class="btn btn-num" data-num="3">3</button>
        <button class="btn btn-op" data-op="+">+</button>
        <button class="btn btn-func" data-action="negate">±</button>

        <button class="btn btn-num" data-num="0">0</button>
        <button class="btn btn-num" data-num="00">00</button>
        <button class="btn btn-special" data-op=".">.</button>
        <button class="btn btn-equal" data-action="equal">=</button>
        <button class="btn btn-func" data-action="percentOf">% of</button>
    </div>
    
    <div id="historyContainer" class="history-panel" style="display: flex;">
        <div style="width:100%">
            <div class="history-title">
                <span>📋 पिछली गणनाएँ</span>
                <button class="clear-history" id="clearHistoryBtn">🗑 साफ करें</button>
            </div>
            <ul id="historyList" class="history-list">
                <li style="opacity:0.7; justify-content:center;">— कोई इतिहास नहीं —</li>
            </ul>
        </div>
    </div>
    <footer>⌨️ कीबोर्ड सपोर्ट | 🔊 क्लिक फील | 💡 बाइक मीटर ग्लो | 🌗 थीम <br> Made by Durgesh Sharma</footer>
</div>

<script>
    // ---------- STATE ----------
    let currentInput = "0";
    let previousInput = null;
    let currentOperator = null;
    let waitingForNewOperand = false;
    let errorState = false;
    let history = [];
    let historyVisible = true;

    const expressionDiv = document.getElementById('expression');
    const resultDiv = document.getElementById('result');
    const historyListEl = document.getElementById('historyList');
    const historyContainer = document.getElementById('historyContainer');
    const themeToggle = document.getElementById('themeToggleBtn');
    const historyToggle = document.getElementById('historyToggleBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    // ---------------- SOUND & VIBRATION ----------------
    function playClick() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.06;
            oscillator.type = 'sine';
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            oscillator.stop(audioCtx.currentTime + 0.08);
            setTimeout(() => audioCtx.close(), 200);
        } catch(e) { }
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(8);
        }
    }
    
    function addRipple(event, element) {
        const rect = element.getBoundingClientRect();
        const ripple = document.createElement('span');
        const size = Math.max(rect.width, rect.height);
        const x = event.clientX - rect.left - size / 2;
        const y = event.clientY - rect.top - size / 2;
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        ripple.classList.add('ripple');
        element.style.position = 'relative';
        element.appendChild(ripple);
        setTimeout(() => ripple.remove(), 400);
    }

    function formatDisplay(value) {
        if (value === null || value === undefined) return "0";
        if (errorState) return "Error";
        let num = parseFloat(value);
        if (isNaN(num)) return "0";
        
        if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-8 && Math.abs(num) !== 0)) {
            return num.toExponential(8);
        }
        
        let formatted = num.toString();
        if (formatted.includes('.')) {
            formatted = formatted.replace(/\.?0+$/, '');
        }
        if (formatted.length > 20) {
            return num.toExponential(8);
        }
        return formatted;
    }

    function updateDisplay() {
        if (errorState) {
            resultDiv.innerText = "Error";
            resultDiv.classList.add('error-display');
            expressionDiv.innerText = "";
            return;
        }
        resultDiv.classList.remove('error-display');
        if (previousInput !== null && currentOperator !== null && !waitingForNewOperand) {
            let opSym = currentOperator === '*' ? '×' : (currentOperator === '/' ? '÷' : currentOperator);
            expressionDiv.innerText = formatDisplay(previousInput) + " " + opSym + " " + formatDisplay(currentInput);
        } else {
            expressionDiv.innerText = "";
        }
        resultDiv.innerText = formatDisplay(currentInput);
    }

    function addToHistory(expressionStr, finalResult) {
        if (finalResult === undefined || finalResult === null) return;
        if (finalResult === "Error") return;
        const timestamp = new Date().toLocaleTimeString('hi-IN', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
        history.unshift({ expr: expressionStr, res: finalResult, time: timestamp });
        if (history.length > 25) history.pop();
        renderHistory();
    }

    function renderHistory() {
        if (!historyListEl) return;
        if (history.length === 0) {
            historyListEl.innerHTML = '<li style="opacity:0.7; justify-content:center;">📭 कोई इतिहास नहीं</li>';
            return;
        }
        historyListEl.innerHTML = history.map((item, idx) => 
            `<li data-idx="${idx}"> 
                <span style="flex:1; overflow-x:auto;">${item.expr}</span> 
                <span style="font-weight:bold; color:#2dd4bf; margin:0 8px;">= ${item.res}</span>
                <span class="history-time">🕐 ${item.time}</span>
            </li>`
        ).join('');
        
        document.querySelectorAll('#historyList li[data-idx]').forEach(li => {
            li.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(li.getAttribute('data-idx'));
                if (!isNaN(idx) && history[idx]) {
                    let restoredVal = history[idx].res;
                    currentInput = restoredVal.toString();
                    previousInput = null;
                    currentOperator = null;
                    waitingForNewOperand = true;
                    errorState = false;
                    updateDisplay();
                    playClick();
                }
            });
        });
    }

    function computeResult(saveToHistoryFlag = true) {
        if (previousInput === null || currentOperator === null || waitingForNewOperand) return false;
        let a = parseFloat(previousInput);
        let b = parseFloat(currentInput);
        if (isNaN(a) || isNaN(b)) { errorState = true; updateDisplay(); return false; }
        let result;
        switch (currentOperator) {
            case '+': result = a + b; break;
            case '-': result = a - b; break;
            case '*': result = a * b; break;
            case '/': 
                if (b === 0) { errorState = true; updateDisplay(); return false; }
                result = a / b; break;
            case '%': result = a * (b / 100); break;
            default: return false;
        }
        
        if (!isFinite(result)) {
            errorState = true;
            updateDisplay();
            return false;
        }
        
        let exprForHistory = `${formatDisplay(previousInput)} ${currentOperator === '*' ? '×' : (currentOperator === '/' ? '÷' : currentOperator)} ${formatDisplay(currentInput)}`;
        currentInput = result.toString();
        previousInput = null;
        currentOperator = null;
        waitingForNewOperand = true;
        updateDisplay();
        if (saveToHistoryFlag && !errorState && currentInput !== "Error") {
            addToHistory(exprForHistory, formatDisplay(currentInput));
        }
        return true;
    }

    function handleNumber(num) {
        if (errorState) clearAll();
        if (waitingForNewOperand) {
            currentInput = num;
            waitingForNewOperand = false;
        } else {
            if (currentInput === "0") currentInput = num;
            else currentInput += num;
        }
        if (currentInput.length > 25) currentInput = currentInput.slice(0, 25);
        updateDisplay();
        playClick();
    }

    function handleDecimal() {
        if (errorState) clearAll();
        if (waitingForNewOperand) {
            currentInput = "0.";
            waitingForNewOperand = false;
            updateDisplay();
            playClick();
            return;
        }
        if (!currentInput.includes('.')) currentInput += '.';
        updateDisplay();
        playClick();
    }

    function handleOperator(op) {
        if (errorState) clearAll();
        if (previousInput !== null && currentOperator !== null && !waitingForNewOperand) {
            computeResult(true);
        }
        previousInput = currentInput;
        currentOperator = op;
        waitingForNewOperand = true;
        updateDisplay();
        playClick();
    }

    function handleEqual() {
        if (errorState) { clearAll(); return; }
        if (previousInput !== null && currentOperator !== null && !waitingForNewOperand) {
            computeResult(true);
        } else {
            playClick();
        }
    }

    function handlePercentOf() {
        if (errorState) clearAll();
        if (previousInput !== null && !waitingForNewOperand) {
            let percent = parseFloat(currentInput);
            let total = parseFloat(previousInput);
            if (isNaN(percent) || isNaN(total)) { errorState = true; updateDisplay(); return; }
            let result = (percent / 100) * total;
            if (!isFinite(result)) { errorState = true; updateDisplay(); return; }
            let exprHistory = `${formatDisplay(previousInput)} % of ${formatDisplay(currentInput)}`;
            currentInput = result.toString();
            previousInput = null;
            currentOperator = null;
            waitingForNewOperand = true;
            updateDisplay();
            addToHistory(exprHistory, formatDisplay(currentInput));
        } else {
            let val = parseFloat(currentInput);
            if (!isNaN(val)) {
                let result = val / 100;
                currentInput = result.toString();
                waitingForNewOperand = true;
                updateDisplay();
                addToHistory(`${val}% (प्रतिशत)`, formatDisplay(currentInput));
            }
        }
        playClick();
    }

    function handleUnary(action) {
        if (errorState) clearAll();
        let val = parseFloat(currentInput);
        if (isNaN(val)) { errorState = true; updateDisplay(); return; }
        let result;
        switch(action) {
            case 'sqrt': if (val < 0) { errorState = true; updateDisplay(); return; } result = Math.sqrt(val); break;
            case 'square': result = val * val; break;
            case 'reciprocal': if (val === 0) { errorState = true; updateDisplay(); return; } result = 1 / val; break;
            case 'negate': result = -val; break;
            default: return;
        }
        if (!isFinite(result)) { errorState = true; updateDisplay(); return; }
        let oldVal = currentInput;
        currentInput = result.toString();
        waitingForNewOperand = true;
        previousInput = null;
        currentOperator = null;
        updateDisplay();
        let opName = action === 'sqrt' ? '√' : (action === 'square' ? 'x²' : (action === 'reciprocal' ? '1/x' : '±'));
        addToHistory(`${opName}(${formatDisplay(oldVal)})`, formatDisplay(currentInput));
        playClick();
    }

    // ========== FIXED: handleBackspace with NaN safety ==========
    function handleBackspace() {
        // Error state में clear
        if (errorState) { 
            clearAll(); 
            return; 
        }
        
        // अगर नया operand wait कर रहा है तो कुछ न करें
        if (waitingForNewOperand) return;
        
        // 🔥 CRITICAL FIX: NaN चेक - अगर currentInput NaN है तो रीसेट करें
        if (isNaN(parseFloat(currentInput))) {
            currentInput = "0";
            updateDisplay();
            playClick();
            return;
        }
        
        // नॉर्मल backspace लॉजिक
        if (currentInput.length === 1 || (currentInput.length === 2 && currentInput.startsWith('-'))) {
            currentInput = "0";
        } else {
            currentInput = currentInput.slice(0, -1);
            // अगर खाली हो गया या सिर्फ '-' है तो 0 करें
            if (currentInput === "" || currentInput === "-") {
                currentInput = "0";
            }
        }
        
        // एक बार और NaN चेक (सुरक्षा के लिए)
        if (isNaN(parseFloat(currentInput))) {
            currentInput = "0";
        }
        
        updateDisplay();
        playClick();
    }

    function clearAll() {
        currentInput = "0";
        previousInput = null;
        currentOperator = null;
        waitingForNewOperand = false;
        errorState = false;
        updateDisplay();
        playClick();
    }

    function toggleTheme() {
        document.body.classList.toggle('light');
        localStorage.setItem('calcTheme', document.body.classList.contains('light') ? 'light' : 'dark');
        playClick();
    }
    
    function toggleHistoryPanel() {
        if (historyContainer) {
            historyVisible = !historyVisible;
            historyContainer.style.display = historyVisible ? 'flex' : 'none';
            localStorage.setItem('historyVisible', historyVisible);
            playClick();
        }
    }
    
    function clearHistory() {
        if (confirm('⚠️ क्या आप सभी इतिहास हटाना चाहते हैं?')) {
            history = [];
            renderHistory();
            playClick();
        }
    }

    function handleKeyboard(e) {
        const key = e.key;
        if (/^[0-9]$/.test(key)) handleNumber(key);
        else if (key === '.') handleDecimal();
        else if (key === '+') handleOperator('+');
        else if (key === '-') handleOperator('-');
        else if (key === '*') handleOperator('*');
        else if (key === '/') handleOperator('/');
        else if (key === '%') handleOperator('%');
        else if (key === 'Enter' || key === '=') { e.preventDefault(); handleEqual(); }
        else if (key === 'Backspace') handleBackspace();
        else if (key === 'Escape' || key === 'Delete') clearAll();
        else if (key === 'c' || key === 'C') clearAll();
    }

    function attachRipples() {
        document.querySelectorAll('.btn, .icon-btn, .clear-history').forEach(btn => {
            btn.addEventListener('click', (e) => {
                addRipple(e, btn);
            });
        });
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('calcTheme');
        if (savedTheme === 'light') document.body.classList.add('light');
        else document.body.classList.remove('light');
    }
    
    function initHistoryVisibility() {
        const saved = localStorage.getItem('historyVisible');
        if (saved === 'false') {
            historyVisible = false;
            historyContainer.style.display = 'none';
        } else {
            historyVisible = true;
            historyContainer.style.display = 'flex';
        }
    }

    // Event listeners
    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            if (btn.hasAttribute('data-num')) handleNumber(btn.getAttribute('data-num'));
            else if (btn.hasAttribute('data-op')) {
                let op = btn.getAttribute('data-op');
                if (op === '.') handleDecimal();
                else if (op === '%') handleOperator('%');
                else handleOperator(op);
            }
            else if (btn.hasAttribute('data-action')) {
                let act = btn.getAttribute('data-action');
                switch(act) {
                    case 'clear': clearAll(); break;
                    case 'backspace': handleBackspace(); break;
                    case 'equal': handleEqual(); break;
                    case 'sqrt': handleUnary('sqrt'); break;
                    case 'square': handleUnary('square'); break;
                    case 'reciprocal': handleUnary('reciprocal'); break;
                    case 'negate': handleUnary('negate'); break;
                    case 'percentOf': handlePercentOf(); break;
                }
            }
        });
    });
    
    themeToggle.addEventListener('click', toggleTheme);
    historyToggle.addEventListener('click', toggleHistoryPanel);
    clearHistoryBtn.addEventListener('click', clearHistory);
    window.addEventListener('keydown', handleKeyboard);
    
    initTheme();
    initHistoryVisibility();
    attachRipples();
    renderHistory();
    updateDisplay();
</script>
</body>
</html>
